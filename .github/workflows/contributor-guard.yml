name: contributor-guard

# Hard guarantee that no AI co-author or non-Xiangyue-Zhang author sneaks
# into this repository. Installed 2026-04-08 after the claude-contributor
# incident — see commit-msg hook + ~/.claude memory for full context.

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  guard:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout full history of pushed range
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Verify all new commits are authored by Xiangyue-Zhang and contain no AI trailers
        run: |
          set -euo pipefail

          # Determine the commit range to check
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            BASE="${{ github.event.pull_request.base.sha }}"
            HEAD="${{ github.event.pull_request.head.sha }}"
            RANGE="${BASE}..${HEAD}"
          elif [ "${{ github.event.before }}" = "0000000000000000000000000000000000000000" ]; then
            # Initial push of a branch — check the last 50 commits
            RANGE="HEAD~50..HEAD"
            git log --format='%H' HEAD~50..HEAD >/dev/null 2>&1 || RANGE="HEAD"
          else
            BASE="${{ github.event.before }}"
            HEAD="${{ github.event.after }}"
            RANGE="${BASE}..${HEAD}"
          fi

          echo "Checking commit range: $RANGE"
          echo "----------------------------------------"

          FAIL=0
          ALLOWED_NAME="Xiangyue-Zhang"
          ALLOWED_EMAILS="85532891\\+Xiangyue-Zhang@users\\.noreply\\.github\\.com|Xiangyue-Zhang@users\\.noreply\\.github\\.com"

          for sha in $(git log --format='%H' "$RANGE" 2>/dev/null || git log --format='%H' HEAD); do
            AN=$(git show -s --format='%an' "$sha")
            AE=$(git show -s --format='%ae' "$sha")
            MSG=$(git show -s --format='%B' "$sha")

            echo "commit $sha"
            echo "  author: $AN <$AE>"

            # Check author name
            if [ "$AN" != "$ALLOWED_NAME" ]; then
              echo "  ❌ author name '$AN' is not '$ALLOWED_NAME'"
              FAIL=1
            fi

            # Check author email
            if ! echo "$AE" | grep -qE "^($ALLOWED_EMAILS)$"; then
              echo "  ❌ author email '$AE' is not in allow-list"
              FAIL=1
            fi

            # Check for Co-Authored-By trailer
            if echo "$MSG" | grep -qiE '^Co-Authored-By:'; then
              echo "  ❌ commit message contains forbidden Co-Authored-By trailer"
              FAIL=1
            fi

            # Check for AI assistant names in commit message
            if echo "$MSG" | grep -qiE '\b(claude|anthropic|openai|gpt-[0-9]|copilot|cursor|codex)\b'; then
              echo "  ⚠️  commit message mentions AI assistant name (allowed if intentional, but flagged)"
              # warn only — do not fail, since legitimate features may mention these
            fi

            echo ""
          done

          if [ $FAIL -ne 0 ]; then
            echo "========================================"
            echo "❌ contributor-guard FAILED"
            echo "One or more commits violate the contributor policy."
            echo "Allowed author: $ALLOWED_NAME <85532891+Xiangyue-Zhang@users.noreply.github.com>"
            echo "Forbidden: any Co-Authored-By trailer."
            echo "========================================"
            exit 1
          fi

          echo "========================================"
          echo "✅ contributor-guard passed"
          echo "All commits authored by $ALLOWED_NAME with no Co-Authored-By trailers."
          echo "========================================"
